<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>COPY</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-weak: #e2e8f0;
      --border: #e5e7eb;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      --radius: 14px;
      --vh: 1vh;
      font-family: "Segoe UI", "PingFang SC", -apple-system, sans-serif;
    }

    :root.dark {
      --bg: #0b1220;
      --card: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-weak: #1e293b;
      --border: #1f2937;
      --shadow: none;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 20%, #e0ecff 0, transparent 30%),
                  radial-gradient(circle at 80% 0%, #ffe6f0 0, transparent 26%),
                  var(--bg);
      color: var(--text);
      min-height: calc(var(--vh) * 100);
      height: calc(var(--vh) * 100);
      padding: 20px 12px 16px;
      overflow: hidden;
      overscroll-behavior: none;
      position: relative;
      width: 100%;
    }
    body.page-locked {
      position: fixed;
      inset: 0;
      width: 100%;
    }

    :root.dark body {
      background: var(--bg);
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      height: calc(var(--vh) * 100 - 32px);
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .title { font-size: 20px; font-weight: 700; }
    .subtitle { color: var(--muted); }
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: var(--shadow);
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      background: var(--card);
      color: var(--text);
      transition: all 0.15s ease;
      box-shadow: var(--shadow);
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .theme-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-weak);
    }

    :root { --kb-offset: 0px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      gap: 12px;
      position: relative;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1 1 auto;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      padding-bottom: calc(72px + var(--kb-offset) + env(safe-area-inset-bottom, 0px));
    }
    .item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 12px 10px;
      background: var(--card);
      color: var(--text);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }
    .content {
      word-break: break-word;
      white-space: pre-wrap;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-height: 48px;
      color: var(--text);
    }
    .content a {
      color: inherit;
      text-decoration: none;
    }
    .meta { color: var(--muted); font-size: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: nowrap; }
    button {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s ease;
      font-size: 14px;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .danger { color: #b91c1c; border-color: #fecdd3; }
    .danger:hover { background: #fff1f2; border-color: #fca5a5; }
    .primary {
      background: var(--accent);
      color: #fff !important;
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      padding: 10px 16px;
      white-space: nowrap;
      font-weight: 700;
      font-size: 15px;
      line-height: 1;
      height: 42px;
    }
    .primary:hover { filter: brightness(1.05); }
    .primary:active { color: #fff; }
    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.08) brightness(0.96);
    }
    .primary:disabled {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: none;
      filter: none;
    }

    .status { color: var(--muted); font-size: 13px; min-height: 18px; }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding-top: 8px;
      padding-bottom: 4px;
      position: sticky;
      bottom: calc(var(--kb-offset) + env(safe-area-inset-bottom, 0px));
      background: var(--card);
      z-index: 2;
      box-shadow: 0 -6px 18px rgba(0,0,0,0.04);
    }
    .text-input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 16px;
      font-family: inherit;
      background: var(--card);
      color: var(--text);
      line-height: 42px;
    }
    .text-input::placeholder { color: var(--muted); }
    .text-input:focus { outline: 2px solid rgba(37, 99, 235, 0.2); border-color: var(--accent); }
    @media (max-width: 640px) {
      :root, body, html { height: calc(var(--vh) * 100); overflow: hidden; }
      body {
        padding: 12px 10px 12px;
      }
      .container { height: calc(var(--vh) * 100 - 24px); display: flex; flex-direction: column; gap: 10px; }
      .card {
        flex: 1 1 auto;
        max-height: none;
        display: flex;
        flex-direction: column;
      }
      .list {
        max-height: none;
        flex: 1 1 auto;
        min-height: 0;
        padding-bottom: 12px;
      }
      .item { grid-template-columns: 1fr auto; gap: 8px; }
      .actions { justify-content: flex-end; gap: 6px; }
      .actions button { font-size: 13px; padding: 7px 9px; white-space: nowrap; }
      .input-row { grid-template-columns: 1fr auto; gap: 8px; }
    }

    /* Dark theme overrides */
    :root.dark .item {
      background: var(--card);
      color: var(--muted);
    }
    :root.dark .item .content,
    :root.dark .item .meta {
      color: var(--muted);
    }
    :root.dark .title {
      color: var(--muted);
    }
    :root.dark .theme-toggle {
      color: var(--muted);
    }
    :root.dark .danger {
      color: var(--muted);
      border-color: var(--border);
    }
    :root.dark .danger:hover {
      background: var(--border);
      border-color: var(--border);
    }
    :root.dark .copy,
    :root.dark .theme-toggle {
      color: var(--muted);
      border-color: var(--border);
      background: var(--card);
      box-shadow: none;
    }
    :root.dark .primary {
      background: var(--card);
      color: var(--muted);
      border-color: var(--border);
      box-shadow: none;
    }
    :root.dark .primary:disabled {
      background: var(--card);
      color: var(--muted);
      border-color: var(--border);
      filter: grayscale(0.08) brightness(0.98);
    }

    :root.dark .primary:hover,
    :root.dark .copy:hover,
    :root.dark .theme-toggle:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* Modal & toast */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      width: min(92vw, 360px);
      box-shadow: var(--shadow);
      color: var(--text);
    }
    .modal h3 { margin: 0 0 8px; font-size: 16px; }
    .modal p { margin: 0 0 14px; color: var(--muted); font-size: 14px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .toast {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 40;
      min-width: 180px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title" style="display:flex;align-items:center;gap:10px;">
        FISHBLUE
        <button id="refreshBtn" class="refresh-btn" aria-label="刷新">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0114.13-3.36L23 10"></path>
            <path d="M20.49 15a9 9 0 01-14.13 3.36L1 14"></path>
          </svg>
        </button>
      </div>
      <button id="themeBtn" class="theme-toggle" aria-label="切换主题">
        <span class="theme-dot"></span>
        <span id="themeLabel">浅色</span>
      </button>
    </div>
    <div class="card">
      <div id="status" class="status"></div>
      <div id="list" class="list"></div>
      <div class="input-row">
        <input id="input" class="text-input" type="text" placeholder="在此输入内容，点击发送提交" autocomplete="off" />
        <button id="send" class="primary">发送</button>
      </div>
    </div>
  </div>

  <!-- 自定义确认弹窗 -->
  <div id="modal" class="modal-backdrop">
    <div class="modal">
      <h3>确认删除</h3>
      <p id="modalText">确定删除这条记录吗？</p>
      <div class="modal-actions">
        <button id="modalCancel">取消</button>
        <button id="modalConfirm" class="danger">删除</button>
      </div>
    </div>
  </div>

  <!-- 轻提示 -->
  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = "https://early-api.fishbule.cn";
    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const refreshBtn = document.getElementById("refreshBtn");
    const themeBtn = document.getElementById("themeBtn");
    const themeLabel = document.getElementById("themeLabel");
    const rootEl = document.documentElement;
    const modalEl = document.getElementById("modal");
    const modalTextEl = document.getElementById("modalText");
    const modalCancelBtn = document.getElementById("modalCancel");
    const modalConfirmBtn = document.getElementById("modalConfirm");
    const toastEl = document.getElementById("toast");
    let itemsCache = [];
    let pendingDeleteId = null;
    const initialViewportHeight = window.visualViewport?.height || window.innerHeight;
    let baseViewportHeight = initialViewportHeight;
    let locked = false;

    // 处理移动端视口高度（键盘弹出时防止布局被顶起后无法恢复）
    const setViewportHeight = () => {
      if (locked) {
        document.documentElement.style.setProperty("--vh", `${baseViewportHeight * 0.01}px`);
        return;
      }
      const vh = (window.visualViewport?.height || window.innerHeight) * 0.01;
      document.documentElement.style.setProperty("--vh", `${vh}px`);
    };
    const setKeyboardOffset = () => {
      const current = window.visualViewport?.height || window.innerHeight;
      if (current > baseViewportHeight) baseViewportHeight = current; // 只抬高基线
      const offset = Math.max(0, baseViewportHeight - current);
      document.documentElement.style.setProperty("--kb-offset", `${offset}px`);
      // 如果输入框在键盘弹出后被挤出视口，强制滚动到输入区
      const inputRow = document.querySelector(".input-row");
      if (inputRow) {
        const rect = inputRow.getBoundingClientRect();
        const viewportH = window.visualViewport?.height || window.innerHeight;
        if (rect.bottom > viewportH) {
          inputRow.scrollIntoView({ block: "end", behavior: "smooth" });
        }
      }
      window.scrollTo(0, 0);
    };
    const lockPage = () => {
      if (locked) return;
      locked = true;
      document.body.classList.add("page-locked");
      window.scrollTo(0, 0);
      setTimeout(() => window.scrollTo(0, 0), 50);
    };
    const unlockPage = () => {
      if (!locked) return;
      locked = false;
      document.body.classList.remove("page-locked");
      window.scrollTo(0, 0);
    };
    setViewportHeight();
    setKeyboardOffset();
    window.addEventListener("resize", () => {
      if (locked) return;
      setViewportHeight();
      setKeyboardOffset();
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        setViewportHeight();
        setKeyboardOffset();
      });
      window.visualViewport.addEventListener("scroll", setKeyboardOffset);
    }
    inputEl.addEventListener("focus", () => { lockPage(); setKeyboardOffset(); });
    inputEl.addEventListener("blur", () => { unlockPage(); document.documentElement.style.setProperty("--kb-offset", "0px"); });

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || "";
      statusEl.style.color = isError ? "#b91c1c" : "var(--muted)";
    }

    function applyTheme(mode) {
      const isDark = mode === "dark";
      rootEl.classList.toggle("dark", isDark);
      themeLabel.textContent = isDark ? "深色" : "浅色";
      try { localStorage.setItem("theme", mode); } catch {}
    }

    // 初始主题：localStorage > 系统偏好 > 默认浅色
    (() => {
      let saved = null;
      try { saved = localStorage.getItem("theme"); } catch {}
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const initial = saved || (prefersDark ? "dark" : "light");
      applyTheme(initial);
    })();

    themeBtn.addEventListener("click", () => {
      const next = rootEl.classList.contains("dark") ? "light" : "dark";
      applyTheme(next);
    });
    refreshBtn.addEventListener("click", () => {
      fetchTexts();
    });

    async function fetchTexts() {
      setStatus("加载中...");
      try {
        const res = await fetch(API_BASE + "/texts");
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "加载失败");
        itemsCache = data.data || [];
        renderList(itemsCache);
        setStatus(`共 ${data.count ?? data.data.length} 条`);
      } catch (e) {
        setStatus(e.message, true);
      }
    }

    function renderList(items) {
      if (!items.length) {
        listEl.innerHTML = '<div style="color:var(--muted);text-align:center;padding:18px 0;">暂无数据</div>';
        return;
      }
      // 显示最新在底部：反转顺序（接口为倒序）
      const ordered = [...items].reverse();
      listEl.innerHTML = ordered
        .map(item => {
          const time = formatTime(item.created_at);
          return `
            <div class="item" data-id="${item.id}">
              <div>
                <div class="content">${escapeHtml(item.content)}</div>
                <div class="meta">${time}</div>
              </div>
              <div class="actions">
                <button class="danger delete" data-id="${item.id}">删除</button>
                <button class="copy" data-id="${item.id}">复制</button>
              </div>
            </div>
          `;
        })
        .join("");
      // 滚动到底部以显示最新数据
      requestAnimationFrame(() => {
        listEl.scrollTop = listEl.scrollHeight;
      });
    }

    function escapeHtml(str = "") {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatTime(ts) {
      if (!ts) return "";
      // treat DB timestamp as UTC, display in local time
      const d = new Date(ts.endsWith("Z") ? ts : ts + "Z");
      if (isNaN(d.getTime())) return ts;
      return d.toLocaleString();
    }

    function showToast(msg, isError = false) {
      toastEl.textContent = msg;
      toastEl.style.borderColor = isError ? "#fca5a5" : "var(--border)";
      toastEl.style.display = "block";
      setTimeout(() => { toastEl.style.display = "none"; }, 2200);
    }

    async function submitText() {
      const content = inputEl.value.trim();
      inputEl.blur(); // 发送后收起键盘
      inputEl.value = ""; // 点击即清空
      if (!content) {
        setStatus("内容不能为空", true);
        return;
      }
      const tempItem = {
        id: "tmp-" + Date.now(),
        content,
        created_at: new Date().toISOString(),
      };
      itemsCache = [tempItem, ...itemsCache];
      renderList(itemsCache);
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 12000);
        const res = await fetch(API_BASE + "/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content }),
          signal: controller.signal,
        });
        clearTimeout(timer);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "提交失败");
        // replace temp with real item
        itemsCache = itemsCache.map(i => i.id === tempItem.id ? data.data : i);
        setStatus("提交成功");
        showToast("提交成功");
        await fetchTexts();
      } catch (e) {
        setStatus(e.message, true);
        showToast(e.message, true);
        // revert optimistic item
        itemsCache = itemsCache.filter(i => i.id !== tempItem.id);
        renderList(itemsCache);
      }
    }

    async function deleteText(id) {
      if (!id) return;
      try {
        const res = await fetch(API_BASE + "/texts/" + id, { method: "DELETE" });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "删除失败");
        setStatus("删除成功");
        showToast("删除成功");
        await fetchTexts();
      } catch (e) {
        setStatus(e.message, true);
        showToast(e.message, true);
      }
    }

    async function copyContent(id) {
      const item = listEl.querySelector(`.item[data-id="${id}"] .content`);
      if (!item) return;
      const text = item.textContent;
      try {
        await navigator.clipboard.writeText(text);
        setStatus("已复制到剪贴板");
      } catch {
        // 兼容部分移动端：使用临时 textarea 方式
        try {
          const helper = document.createElement("textarea");
          helper.value = text;
          helper.style.position = "fixed";
          helper.style.opacity = "0";
          helper.style.left = "-9999px";
          document.body.appendChild(helper);
          helper.focus();
          helper.select();
          const ok = document.execCommand("copy");
          document.body.removeChild(helper);
          if (ok) {
            setStatus("已复制到剪贴板");
            return;
          }
          throw new Error("execCommand 失败");
        } catch {
          setStatus("复制失败，请手动复制", true);
        }
      }
    }

    function openDeleteModal(id) {
      pendingDeleteId = id;
      modalTextEl.textContent = "确定删除这条记录吗？";
      modalEl.style.display = "flex";
    }

    function closeDeleteModal() {
      modalEl.style.display = "none";
      pendingDeleteId = null;
    }

    listEl.addEventListener("click", (e) => {
      const btn = e.target;
      const id = btn.getAttribute("data-id");
      if (!id) return;
      if (btn.classList.contains("copy")) copyContent(id);
      if (btn.classList.contains("delete")) openDeleteModal(id);
    });

    let touchSending = false;
    sendBtn.addEventListener("touchstart", (e) => {
      touchSending = true;
      e.preventDefault();
      submitText();
      setTimeout(() => { touchSending = false; }, 350);
    }, { passive: false });
    sendBtn.addEventListener("click", (e) => {
      if (touchSending) return;
      submitText();
    });
    inputEl.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submitText();
    });

    modalCancelBtn.addEventListener("click", closeDeleteModal);
    modalEl.addEventListener("click", (e) => {
      if (e.target === modalEl) closeDeleteModal();
    });
    modalConfirmBtn.addEventListener("click", async () => {
      if (!pendingDeleteId) return closeDeleteModal();
      const id = pendingDeleteId;
      closeDeleteModal();
      await deleteText(id);
    });

    fetchTexts();
  </script>
</body>
